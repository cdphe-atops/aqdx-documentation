# =======================================================================
# AQDx Measurement Technology Code Taxonomy (v3.0)
# Structure: [Acquisition]-[Conditioning]-[Detection]
# Format: XX[xx]-XX[xx]-XX[xx] (Uppercase = Broad, Lowercase = Subtype)
# =======================================================================
metadata:
  version: "3.0"
  last_updated: "2026-04-14"

taxonomy:
  acquisition:
    CF:
      name: "Continuous Filter Tape"
    DA:
      name: "Direct Air / In Situ"
    IC:
      name: "Integrated Canister"
      subtypes:
        ep: "Electropolished/Passivated (Summa)"
        gl: "Glass"
        sl: "Silica-Lined (SilcoCan)"
    IF:
      name: "Integrated Filter"
    IS:
      name: "Integrated Sorbent"
    PA:
      name: "Passive Acquisition / Unassisted Diffusion"
    RS:
      name: "Remote Sensing"

  conditioning:
    "00":
      name: "None / Standard Configuration"
    CI:
      name: "Chemical Ionization"
      subtypes:
        na: "Negative Acetone Reagent Chemistry"
        ni: "Negative Iodide Reagent Chemistry"
        pa: "Positive Acetone Reagent Chemistry"
        pb: "Positive Benzene Reagent Chemistry"
    GC:
      name: "Gas Chromatography"
      subtypes:
        ca: "Capillary Column"
    IP:
      name: "Inductively Coupled Plasma"
    LC:
      name: "Liquid Chromatography"
    PT:
      name: "Proton-Transfer-Reaction Ionization"
    SS:
      name: "Size-Selective Inlet"
      subtypes:
        vs: "Very Sharp Cut Cyclone"
    TD:
      name: "Thermal Desorption"
      subtypes:
        fo: "focuser"

  detection:
    AA:
      name: "Atomic Absorption Spectroscopy (AAS)"
    BA:
      name: "Beta Attenuation"
    CP:
      name: "Capacitive"
    CR:
      name: "Cavity Ringdown Spectroscopy (CRDS)"
    DO:
      name: "Differential Optical Absorption Spectroscopy (DOAS)"
      subtypes:
        ce: "Cavity-Enhanced (Closed Cell)"
        mx: "Multi-Axis (Passive Sunlight)"
        op: "Open-Path (Active)"
        zs: "Zenith-sky"
    EC:
      name: "Electrochemical"
    ER:
      name: "Electrical Resistance / Thermistor"
    FI:
      name: "Flame Ionization"
    FL:
      name: "Fluorescence Spectroscopy"
    IR:
      name: "Infrared Spectroscopy"
      subtypes:
        ft: "Fourier Transform (FTIR)"
        mi: "mid-infrared"
        nd: "Non-Dispersive (NDIR)"
    ME:
      name: "Mechanical / Kinematic"
      subtypes:
        cp: "Cup and Vane"
    MO:
      name: "Metal Oxide"
    MS:
      name: "Mass Spectrometry"
      subtypes:
        mm: "Tandem (MS-MS)"
        tf: "Time-of-Flight"
    MT:
      name: "Meteorological sensor"
      subtypes:
        pr: "Pressure"
        rh: "Relative humidity"
        sr: "Solar radiation"
        tm: "Temperature"
        wd: "Wind direction"
        ws: "Wind speed"
    PI:
      name: "Photoionization"
    PZ:
      name: "Piezoresistive / Pressure Transducer"
    SC:
      name: "Optical Scattering or Backscattering"
      subtypes:
        ls: "Laser-scattering"
    US:
      name: "Ultrasonic / Acoustic"
    UV:
      name: "Ultraviolet (UV) absorption"
    XR:
      name: "X-Ray Spectroscopy / Analysis"
      subtypes:
        rd: "Diffraction (XRD)"
        rf: "Fluorescence (XRF)"

example_configurations:
  - setup: "Low-Cost Optical PM Sensor (e.g., PurpleAir)"
    code: "DA-00-SC"
  - setup: "Regulatory PM Monitor (e.g., BAM-1020 with Very Sharp Cut Cyclone)"
    code: "CF-SSvs-BA"
  - setup: "Standard Extractive CE-DOAS (e.g., NO2 analyzer)"
    code: "DA-00-DOce"
  - setup: "Proton Transfer Reaction Mass Spectrometer (PTR-MS)"
    code: "DA-PT-MS"
